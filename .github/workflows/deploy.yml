name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same branch when a new push arrives.
# Only the latest commit needs to deploy.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/salon-mgmt

jobs:
  # ── Build and push both images in parallel ──────────────────────────────────
  build-api:
    name: Build API image
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ env.REGISTRY }}/salon-api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/salon-api:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -f backend/Dockerfile \
            -t ${{ env.REGISTRY }}/salon-api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/salon-api:latest \
            .
          docker push ${{ env.REGISTRY }}/salon-api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/salon-api:latest

  build-frontend:
    name: Build frontend image
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontend image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build \
            --cache-from ${{ env.REGISTRY }}/salon-frontend:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg VITE_API_URL=${{ vars.API_URL }} \
            -f frontend/Dockerfile \
            -t ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/salon-frontend:latest \
            ./frontend
          docker push ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/salon-frontend:latest

  # ── Deploy both services (runs after both builds succeed) ───────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: self-hosted
    needs: [build-api, build-frontend]
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          ENV_FLAG="--update-env-vars RUN_SEED=true,RUN_IMPORT=true"
          if [ -n "$FRONTEND_URL" ]; then
            ENV_FLAG="--update-env-vars FRONTEND_URL=$FRONTEND_URL,CORS_ORIGINS=$FRONTEND_URL,RUN_SEED=true,RUN_IMPORT=true"
          fi
          gcloud run deploy salon-api \
            --image ${{ env.REGISTRY }}/salon-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-cloudsql-instances ${{ vars.CLOUD_SQL_INSTANCE }} \
            --timeout 900 \
            $ENV_FLAG \
            --quiet

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy salon-frontend \
            --image ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --quiet

      - name: Print deployed URLs
        run: |
          echo "API: $(gcloud run services describe salon-api --region ${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe salon-frontend --region ${{ env.GCP_REGION }} --format='value(status.url)')"
