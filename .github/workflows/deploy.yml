name: Deploy to Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run when a new push arrives — only the latest commit deploys.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/salon-mgmt

jobs:
  deploy:
    name: Build and deploy
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit to detect changes

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Detect which sides changed ─────────────────────────────────────────
      # workflow_dispatch always builds both. Push builds only what changed.
      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true"      >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # API rebuilds when backend code, migrations, scripts, or CI itself changes
          if echo "$CHANGED" | grep -qE '^(backend/|migrations/|scripts/|alembic\.ini|\.github/)'; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi

          # Frontend rebuilds when frontend code changes
          if echo "$CHANGED" | grep -qE '^frontend/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

      # ── API image ──────────────────────────────────────────────────────────
      - name: Build and push API image
        if: steps.changes.outputs.api == 'true'
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ env.REGISTRY }}/salon-api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/salon-api:latest \
            .
          docker push ${{ env.REGISTRY }}/salon-api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/salon-api:latest

      - name: Retag existing API image (no backend changes)
        if: steps.changes.outputs.api == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGISTRY }}/salon-api:latest \
            ${{ env.REGISTRY }}/salon-api:${{ github.sha }}

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Build and push frontend image
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ vars.API_URL }} \
            --build-arg VITE_QZ_PRIVATE_KEY="${{ secrets.QZ_TRAY_PRIVATE_KEY }}" \
            --build-arg VITE_SSO_ENABLED=true \
            -f frontend/Dockerfile \
            -t ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/salon-frontend:latest \
            ./frontend
          docker push ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/salon-frontend:latest

      - name: Retag existing frontend image (no frontend changes)
        if: steps.changes.outputs.frontend == 'false'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.REGISTRY }}/salon-frontend:latest \
            ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }}

      # ── Migrations ─────────────────────────────────────────────────────────
      # Run alembic against Cloud SQL via the auth proxy BEFORE deploying the
      # new revision. This used to live inside docker-entrypoint.sh but the
      # Cloud SQL socket isn't reliably ready at container startup on Gen2,
      # causing the revision to time out before listening on PORT.
      #
      # The runner's service account already has roles/cloudsql.client, so
      # the proxy auths via Application Default Credentials. DB_PASSWORD is
      # pulled from Secret Manager at job time — not stored in GitHub Secrets.
      - name: Install uv
        if: steps.changes.outputs.api == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Cloud SQL Auth Proxy
        if: steps.changes.outputs.api == 'true'
        run: |
          if ! [ -x "$HOME/.local/bin/cloud-sql-proxy" ]; then
            mkdir -p "$HOME/.local/bin"
            curl -sSL -o "$HOME/.local/bin/cloud-sql-proxy" \
              https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
            chmod +x "$HOME/.local/bin/cloud-sql-proxy"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run alembic migrations
        if: steps.changes.outputs.api == 'true'
        shell: bash
        env:
          CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}
        run: |
          set -euo pipefail

          # Pull the DB password from Secret Manager — never stored in
          # GitHub Secrets. The runner SA has secretAccessor on this secret.
          DB_PASSWORD_RAW="$(gcloud secrets versions access latest \
            --secret=salon-db-password \
            --project="${{ env.GCP_PROJECT_ID }}")"

          # URL-encode the password so special characters don't break the
          # DSN parser (asyncpg / SQLAlchemy URL).
          DB_PASSWORD_ENC="$(DB_PW="$DB_PASSWORD_RAW" python3 -c \
            'import os, urllib.parse; print(urllib.parse.quote(os.environ["DB_PW"], safe=""))')"
          # Mask the password in any log output.
          echo "::add-mask::$DB_PASSWORD_RAW"
          echo "::add-mask::$DB_PASSWORD_ENC"

          # Start the Cloud SQL Auth Proxy in TCP mode on a high port. The
          # proxy uses Application Default Credentials from the auth step.
          cloud-sql-proxy --port 5433 "$CLOUD_SQL_INSTANCE" &
          PROXY_PID=$!
          trap "kill $PROXY_PID 2>/dev/null || true" EXIT

          # Wait for the proxy to start accepting connections (max ~30s).
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5433) 2>/dev/null; then
              echo "Cloud SQL proxy ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: Cloud SQL proxy never became ready" >&2
              exit 1
            fi
            sleep 1
          done

          # Install backend deps so alembic + asyncpg are available.
          (cd backend && uv sync --frozen)

          # Run alembic from the repo root so it finds alembic.ini there.
          # CLOUD_SQL_INSTANCE is cleared so env.py uses DATABASE_URL and
          # connects via TCP to the local proxy.
          DATABASE_URL="postgresql+asyncpg://salon:${DB_PASSWORD_ENC}@127.0.0.1:5433/salon_lyol" \
          CLOUD_SQL_INSTANCE="" \
            uv --project backend run alembic upgrade head

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy API to Cloud Run
        if: steps.changes.outputs.api == 'true'
        env:
          CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          ASSETS_GCS_BUCKET: ${{ vars.ASSETS_GCS_BUCKET }}
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ vars.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_CALLBACK_URL: ${{ vars.AUTH0_CALLBACK_URL }}
        run: |
          # Clear any Secret Manager reference for RESEND_WEBHOOK_SECRET so it
          # can be set as a plain env var below (conflicts otherwise).
          gcloud run services update salon-api \
            --region ${{ env.GCP_REGION }} \
            --remove-secrets=RESEND_WEBHOOK_SECRET \
            --quiet 2>/dev/null || true

          ENV_FLAG="--update-env-vars CLOUD_SQL_INSTANCE=$CLOUD_SQL_INSTANCE,RUN_SEED=false,RUN_IMPORT=false"
          if [ -n "$FRONTEND_URL" ]; then
            ENV_FLAG="--update-env-vars CLOUD_SQL_INSTANCE=$CLOUD_SQL_INSTANCE,FRONTEND_URL=$FRONTEND_URL,CORS_ORIGINS=$FRONTEND_URL,ASSETS_GCS_BUCKET=$ASSETS_GCS_BUCKET,RESEND_WEBHOOK_SECRET=$RESEND_WEBHOOK_SECRET,AUTH0_DOMAIN=$AUTH0_DOMAIN,AUTH0_CLIENT_ID=$AUTH0_CLIENT_ID,AUTH0_CLIENT_SECRET=$AUTH0_CLIENT_SECRET,AUTH0_CALLBACK_URL=$AUTH0_CALLBACK_URL,RUN_SEED=false,RUN_IMPORT=false"
          fi
          gcloud run deploy salon-api \
            --image ${{ env.REGISTRY }}/salon-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-cloudsql-instances ${{ vars.CLOUD_SQL_INSTANCE }} \
            --timeout 900 \
            $ENV_FLAG \
            --quiet

      - name: Deploy frontend to Cloud Run
        if: steps.changes.outputs.frontend == 'true'
        run: |
          gcloud run deploy salon-frontend \
            --image ${{ env.REGISTRY }}/salon-frontend:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --quiet

      - name: Fetch Cloud Run logs on API failure
        if: failure() && steps.changes.outputs.api == 'true'
        run: |
          echo "=== Last 100 Cloud Run log lines ==="
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="salon-api"' \
            --project ${{ env.GCP_PROJECT_ID }} \
            --limit=100 \
            --order=asc \
            --format="value(timestamp,textPayload)" \
            --freshness=5m || true

      - name: Print deployed URLs
        run: |
          echo "API: $(gcloud run services describe salon-api --region ${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe salon-frontend --region ${{ env.GCP_REGION }} --format='value(status.url)')"
